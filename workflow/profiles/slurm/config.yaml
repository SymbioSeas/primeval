executor: slurm
jobs: 200
# Runs inside the activated `primeval` conda environment on each node
# (conda env create -f environment.yaml && conda activate primeval).
use-conda: false
default-resources:
  mem_mb: 4000
  cpus_per_task: 1
  runtime: 30
set-resources:
  aggregate_report:
    mem_mb: 16000
    cpus_per_task: 4
    runtime: 60
